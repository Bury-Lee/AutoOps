agent_ai:
  model: "deepseek-v4-pro" # AI模型名称, 为local时使用本地模型
  temperature: 0.7 # 温度参数
  max_tokens: 0 # 最大令牌数
  host: "https://api.deepseek.com" # api地址
  ApiKey: "sk-981d6ac3c35b4a23af064ebf34b81d60" # AI密钥
  apiType: "openai" # API类型: openai

Call_Command: "" # 调用人工介入服务的命令

system:
#注:和Cmod,Tmod互斥,不能同时使用!
  ip: "127.0.0.1" # 监控服务IP
  port: "8080" # 监控服务端口
  allow_rpg: false # 是否允许远程调用, 建议关闭,除非自行添加鉴权中间件和安全隔离
  allow_remote: false # 是否允许远程查看日志